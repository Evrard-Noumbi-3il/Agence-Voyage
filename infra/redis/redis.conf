# =============================================================================
# PERSISTANCE — AOF (Append Only File)
# ==============================================================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec          
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# =============================================================================
# PERSISTANCE — RDB (snapshot en plus de AOF)
# =============================================================================
# Sauvegarde si 1 clé change en 15 min
save 900 1    
# Sauvegarde si 10 clés changent en 5 min  
save 300 10     
# Sauvegarde si 10000 clés changent en 1 min
save 60 10000   
dbfilename dump.rdb
dir /data

# =============================================================================
# MÉMOIRE
# =============================================================================
maxmemory 200mb
# Expire les clés les moins utilisées si mémoire pleine
maxmemory-policy allkeys-lru   

# =============================================================================
# RÉSEAU
# =============================================================================
bind 0.0.0.0          
port 6379
timeout 300           
tcp-keepalive 60

# =============================================================================
# SÉCURITÉ
# =============================================================================

# Désactiver les commandes dangereuses
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""

# =============================================================================
# LOGS
# =============================================================================
loglevel notice
logfile ""    

# =============================================================================
# PERFORMANCE
# =============================================================================
hz 10
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes