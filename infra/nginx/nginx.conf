user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # =============================================================================
    # LOGS — Format structuré pour parsing Prometheus/Grafana
    # =============================================================================
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # =============================================================================
    # PERFORMANCE
    # =============================================================================
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;   # Pour les uploads KYC (photos < 5Mo chacune)

    # =============================================================================
    # SÉCURITÉ — Headers globaux
    # =============================================================================
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;

    # =============================================================================
    # RATE LIMITING — Protection brute force
    # =============================================================================
    # Zone auth : 10 req/s par IP sur les endpoints d'authentification
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

    # Zone API générale : 30 req/s par IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Zone upload KYC : 5 req/s par IP (uploads de fichiers)
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

    # =============================================================================
    # GZIP — Compression des réponses
    # =============================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # =============================================================================
    # INCLURE LES CONFIGS PAR SERVICE
    # =============================================================================
    include /etc/nginx/conf.d/*.conf;
}