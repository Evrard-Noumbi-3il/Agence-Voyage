# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — API principale
server {
    listen 443 ssl;
    server_name localhost;   

    # =============================================================================
    # TLS — Certificats (auto-signés en dev, Let's Encrypt en prod)
    # Générer en dev : openssl req -x509 -nodes -days 365 -newkey rsa:2048
    #                  -keyout infra/nginx/certs/dev.key
    #                  -out infra/nginx/certs/dev.crt
    #                  -subj "/CN=localhost"
    # =============================================================================
    ssl_certificate     /etc/nginx/certs/dev.crt;
    ssl_certificate_key /etc/nginx/certs/dev.key;

    # TLS moderne uniquement
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS — Force HTTPS (1 an)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =============================================================================
    # ENDPOINTS AUTH — Rate limiting strict
    # =============================================================================
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # =============================================================================
    # ENDPOINTS KYC UPLOAD — Rate limiting upload
    # =============================================================================
    location /api/kyc/ {
        limit_req zone=upload_limit burst=3 nodelay;
        client_max_body_size 20M;   # 3 photos max × 5Mo + marge

        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # =============================================================================
    # API GÉNÉRALE — Rate limiting standard
    # =============================================================================
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # =============================================================================
    # ACTUATOR — Accès monitoring (Prometheus scrape)
    # Restreint à l'IP Prometheus uniquement en prod
    # =============================================================================
    location /actuator/prometheus {
        # En dev : accès libre depuis le réseau Docker
        # En prod : allow 172.x.x.x (IP Prometheus) ; deny all ;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # =============================================================================
    # KEYCLOAK — Proxy OIDC pour le mobile (discovery + token)
    # =============================================================================
    location /auth/ {
        proxy_pass         http://keycloak:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
        proxy_busy_buffers_size 256k;
    }

    # =============================================================================
    # ERREURS PERSONNALISÉES
    # =============================================================================
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Trop de requêtes. Réessayez dans quelques secondes.","code":429}';
        add_header Content-Type application/json;
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        return 503 '{"error":"Service temporairement indisponible.","code":503}';
        add_header Content-Type application/json;
    }
}