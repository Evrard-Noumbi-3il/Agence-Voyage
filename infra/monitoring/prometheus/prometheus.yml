global:
  scrape_interval:     15s   # Collecte toutes les 15 secondes
  evaluation_interval: 15s   # Évalue les règles d'alerte toutes les 15 secondes
  scrape_timeout:      10s

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Fichiers de règles d'alerte
rule_files:
  - /etc/prometheus/alert.rules.yml

# =============================================================================
# SCRAPE CONFIGS — Sources de métriques
# =============================================================================
scrape_configs:

  # ---------------------------------------------------------------------------
  # Prometheus lui-même
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ---------------------------------------------------------------------------
  # Backend Spring Boot — métriques JVM + HTTP + DB pool + Redis
  # ---------------------------------------------------------------------------
  - job_name: 'adv-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'adv-backend'
          environment: 'dev'
    scrape_interval: 10s
