# =============================================================================
# backend/sonar-project.properties
# Configuration SonarCloud pour le backend Spring Boot ADV
# =============================================================================

# Remplacer par la valeur obtenue sur sonarcloud.io (étape 1.5 du guide)
sonar.projectKey=Evrard-Noumbi-3il_Agence-Voyage
sonar.organization=evrard-noumbi-3il

sonar.projectName=ADV Backend API
sonar.projectVersion=1.0

# Sources Java
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Rapport de coverage JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions — ne pas analyser les fichiers générés
sonar.exclusions=\
  **/generated/**,\
  **/*Application.java,\
  **/config/**,\
  **/dto/**,\
  **/entity/**

# Exclusions du coverage (pas besoin de couvrir les DTOs/entités)
sonar.coverage.exclusions=\
  **/generated/**,\
  **/*Application.java,\
  **/dto/**,\
  **/entity/**,\
  **/config/**

# Langue principale
sonar.language=java
sonar.java.source=21

# Encodage
sonar.sourceEncoding=UTF-8

# Quality Gate — attendre le résultat
sonar.qualitygate.wait=true