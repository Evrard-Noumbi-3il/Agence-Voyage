spring:
  application:
    name: adv-backend
  cloud:
    vault:
      uri: ${VAULT_URI:http://localhost:8200}
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
      kv:
        enabled: true
        backend: secret
        default-context: adv
        application-name: adv